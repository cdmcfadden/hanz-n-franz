<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Plate body -->
  <circle cx="50" cy="50" r="47" fill="#dc2626"/>
  <!-- Outer rim (darker edge) -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#7f1d1d" stroke-width="8"/>
  <!-- Structural groove ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#111111" stroke-width="4"/>
  <!-- Center hub -->
  <circle cx="50" cy="50" r="18" fill="#1a1a1a"/>
  <!-- Barbell hole -->
  <circle cx="50" cy="50" r="9" fill="#050505"/>
</svg>
